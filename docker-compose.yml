services:
  # ── Backend Node.js + Prisma ──
  backend:
    build: ./backend
    container_name: argdelsud-backend
    restart: always
    ports:
      - "3002:3000"
    environment:
      - PORT=3000
      - JWT_SECRET=${JWT_SECRET}
      - DATABASE_URL=${DATABASE_URL}
      - NODE_ENV=production
    networks:
      - default
      - nginx-proxy-manager_default
      - db-principal_default

  # ── Frontend Vite + Nginx ──
  frontend:
    build: ./frontend
    container_name: argdelsud-frontend
    restart: always
    ports:
      - "8092:80"
    depends_on:
      - backend
    networks:
      - default
      - nginx-proxy-manager_default

networks:
  nginx-proxy-manager_default:
    external: true
  db-principal_default:
    external: true

